name: my-first-workflow
# scheduler on every push to the repo
on: 
  push:
    branches: 
      - main
      - dev
      - 'feature-*'
      - 'GAWF-*'
  pull_request:
    branches:
      - main
env:
  ENV_TYPE: DEV
  APP_USER: gawf-tester
  APP_PORT: 80
  
jobs:
  job1:
    name: test basic workflow run
    runs-on: ubuntu-latest
    steps:
      - name: running single command in job1
        run: echo "Hi this is my first github workflow"
      - name: checking the os release
        run:  cat /etc/os-release
  job2:
    name: test multiline command
    runs-on: ubuntu-latest
    steps:
      - name: checking  the hostname for runner
        run: hostname
      - name: Running multiple commands
        run: 
          echo "hi this is test multiple command line 1"
          echo "current time is `date`"
          sleep 20
        
  staging:
    name: stage deployment
    runs-on: ubuntu-latest
    steps:
      - name: referring env variable
        run: echo "[INFO] running deployment on host abc using $${{ vars.USER }}"
      - name: referring environment
        run: echo "[INFO] password for ${{ vars.USER }} is ${{ secrets.STG_USER }}"
    environment:
      name: STAGING
    if: github.ref_name == 'dev'  
  production:
    name: production deployment
    runs-on: ubuntu-latest
    steps:
      - name: referring env variable
        run: echo "[INFO] running deployment on ${{ vars.HOST }} abc using $${{ vars.USER }}"
      - name: referring environment
        run: echo "[INFO] password for $${{ vars.USER }} is ${{ secrets.STG_USER }}"
    environment:
      name: PRODUCTION
    if: github.ref_name == 'main'   
