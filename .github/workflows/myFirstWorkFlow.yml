name: my-first-workflow
# scheduler on every push to the repo
on: 
  push:
    branches: 
      - main
      - dev
  pull_request:
    branches:
      - main
  workflow_dispatch:     
env:
  ENV_TYPE: DEV
  APP_USER: gawf-tester
  APP_PORT: 80
  
jobs:
  unit-tests:
    name: Running unit tests
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v7.0.0
      - name: setup python
        uses:  actions/setup-python@v6.2.0
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Unit Tests
        run: pytest -v
      - name: run unit Tests
        run : |
          mkdir reports/
          pytest --junitxml=reports/unit-test-results.xml --cov=. --cov-report=term-missing -v
      - name: uploade code coverage report
        uses: actions/upload-artifact@v7.0.1
        with:
          name: unit-test-report
          path: reports/    
