name: my-first-workflow
# scheduler on every push to the repo
on: 
  push:  


jobs:
  job1:
    name: test basic workflow run
    runs-on: ubuntu-latest
    steps:
      - name: running STEP-1
        run: |
          pwd
          ls -ltr
          hostname
      - name: checkout
        uses: actions/checkout@v6.0.3
      - name: step-2
        run: |
          echo `pwd` >> myartifact.txt
          mkdir artifacts
          echo `ls -ltr` >> artifacts/list.txt
          echo `hostname` >> artifacts/hostnames.txt
      - name: upload artifact
        uses:  actions/upload-artifact@v7.0.1
        with:
          name: single_file
          path: ./myartifact.txt
      - name: upload from directory
        uses: actions/upload-artifact@v7.0.1
        with:
          name: directory_artifacts
          path: artifacts/
          
      - name: upload from multipe-paths
        uses: actions/upload-artifact@v7.0.1
        with:
          name: multipath_artifacts
          path: |
            ./myartifact.txt
            artifacts/
      - name: upload from multipe-paths with exclusions
        uses: actions/upload-artifact@v7.0.1
        with:
          name: multipath_artifacts with exclusion
          path: |
            ./myartifact.txt
            artifacts/        
            !**/hostnames.txt
  job2:
    name: test download single file
    runs-on: ubuntu-latest
    steps:
     - name: checking current directory
       run: |
         pwd
         ls -ltr
     - name: Download single file artifact
       uses: actions/download-artifact@v3.1.0
       with:
         name: single_file 
     - name: Checking current directory post download
       run: |
         pwd
         ls -ltr







       
